const DEFAULT_RANKING_ERROR="동일한 이름은 설정할 수 없어요";

function getBrowserId(){

  if(!id){

function normalizeRankName(name){
  const raw=(name||"").trim().replace(/\s+/g," ");
  return [...raw].slice(0,10).join("") || "익명";
}
function toRankNameKey(name){
  return encodeURIComponent(name.normalize("NFC").toLocaleLowerCase("ko-KR"));
}
async function initFirebaseRanking(){
  if(firebaseReadyPromise) return firebaseReadyPromise;
  firebaseReadyPromise=(async()=>{
    if(!window.firebase) throw new Error("Firebase SDK를 불러오지 못했어요.");
    firebaseApp=firebase.apps&&firebase.apps.length?firebase.app():firebase.initializeApp(firebaseConfig);
    firebaseDb=firebase.firestore();
    firebaseAuth=firebase.auth();
    await firebaseAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    if(!firebaseAuth.currentUser){
      await firebaseAuth.signInAnonymously();
    }
    return firebaseAuth.currentUser;
  })().catch(err=>{
    firebaseReadyPromise=null;
    throw err;
  });
  return firebaseReadyPromise;
}
function clearRankingNameError(){
  const form=rankingNameInput&&rankingNameInput.closest(".result-form");
  if(form) form.classList.remove("has-error");
  if(rankingNameInput) rankingNameInput.classList.remove("is-invalid");
  if(rankingNameError) rankingNameError.textContent=DEFAULT_RANKING_ERROR;
}
function showRankingNameError(message=DEFAULT_RANKING_ERROR){
  const form=rankingNameInput&&rankingNameInput.closest(".result-form");
  if(form) form.classList.add("has-error");
  if(rankingNameError) rankingNameError.textContent=message;
  if(rankingNameInput){
    rankingNameInput.classList.add("is-invalid");
    rankingNameInput.focus();
  }
}
async function fetchRankings(){
  await initFirebaseRanking();
  const snap=await firebaseDb.collection(RANKING_COLLECTION).orderBy("score","desc").limit(10).get();
  return snap.docs
    .map(doc=>{
      const data=doc.data()||{};
      return {name:data.name||"익명",score:Number(data.score)||0,ownerId:data.playerId||""};
    })
    .filter(item=>item.score>=0)
    .sort((a,b)=>b.score-a.score)
    .slice(0,10);
}
async function saveRanking(name,value){
  const clean=normalizeRankName(name);
  const nameKey=toRankNameKey(clean);
  const numericScore=Math.max(0,Math.floor(Number(value)||0));
  try{
    const user=await initFirebaseRanking();
    const docRef=firebaseDb.collection(RANKING_COLLECTION).doc(nameKey);
    await firebaseDb.runTransaction(async tx=>{
      const snap=await tx.get(docRef);
      const now=firebase.firestore.FieldValue.serverTimestamp();
      if(snap.exists){
        const data=snap.data()||{};
        if(data.playerId&&data.playerId!==user.uid){
          const err=new Error("duplicate-name");
          err.code="duplicate-name";
          throw err;
        }
        const best=Math.max(Number(data.score)||0,numericScore);
        tx.update(docRef,{score:best,updatedAt:now});
      }else{
        tx.set(docRef,{name:clean,nameKey,score:numericScore,playerId:user.uid,createdAt:now,updatedAt:now});
      }
    });
    localStorage.setItem("colorMatchLastName", clean);
    clearRankingNameError();
    return await fetchRankings();
  }catch(err){
    console.error(err);
    if(err&&err.code==="duplicate-name"){
      showRankingNameError(DEFAULT_RANKING_ERROR);
      return null;
    }
    showRankingNameError("랭킹 연결에 실패했어요. 잠시 후 다시 시도해주세요.");
    return null;
  }
}
function rankBadge(index){

  if(index===1) return '<span class="rank-badge rank-medal silver" data-rank="2"></span>';
  if(index===2) return '<span class="rank-badge rank-medal bronze" data-rank="3"></span>';
  return `<span class="rank-badge rank-circle">${index+1}</span>`;
}
function renderRankingRows(list){
  if(!list.length) return '<div class="ranking-empty">아직 등록된 기록이 없어요.</div>';
  return '<ol class="ranking-list">'+list.map((item,index)=>`<li>${rankBadge(index)}<div class="rank-meta"><span class="rank-name">${item.name}</span></div><div class="rank-score-wrap"><strong class="rank-score">${item.score.toLocaleString()}<small>점</small></strong></div></li>`).join("")+'</ol>';
}

      console.error(err);
      overlayBody.innerHTML='<div class="ranking-empty">랭킹을 불러오지 못했어요.</div>';

  }
}

function checkScoreStageClear(){
  if(MODE!=="infinite" || state==="stageClear" || state==="over") return false;
  const st=infStage();
  if(!st.targetScore) return false;
  if(score >= st.targetScore){
    state="stageClear";
    const next=INF_STAGES[Math.min(infStageIndex+1, INF_STAGES.length-1)];
    show(`STAGE ${st.label}`, `${st.name} 스테이지 클리어`, `${next.name} 스테이지로 이동합니다.`, "다음", "stageClear");
    return true;
  }
  return false;
}

    const st=infStage();
    mainValueText.textContent=score.toLocaleString();
    statOneText.textContent=`${st.colors.length}개`;
    statTwoText.textContent=`x${combo}`;
    statThreeText.textContent=st.targetScore?`${st.targetScore.toLocaleString()}점`:"∞";
    if(stageHeaderText) stageHeaderText.textContent=`stage ${st.label}`;
  }else{
    mainValueText.textContent="★".repeat(totalStars)||"0";
    statOneText.textContent=stage+1;
    statTwoText.textContent=balls.length;
    statThreeText.textContent=shotsLeft;
    let warn=shotsLeft>0&&shotsLeft<=Math.max(2,Math.ceil(balls.length/2));

      statThreeCard.classList.remove("blink");

      statThreeCard.classList.add("blink");
      setTimeout(()=>statThreeCard.classList.remove("blink"),1800)
    }

}
